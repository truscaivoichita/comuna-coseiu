<section id="comunitate">
  <h2 data-i18n="title"></h2>

  <div id="cetateni" class="cards grid">
    <h3 data-i18n="cetateni.title"></h3>
    <p data-i18n="cetateni.description"></p>

    <div class="componenta">
      <div class="etnic">
        <h4 data-i18n="cetateni.etnic.title"></h4>
        <ul id="etnic-list"></ul>
      </div>

      <div class="religie">
        <h4 data-i18n="cetateni.religie.title"></h4>
        <ul id="religie-list"></ul>
      </div>
    </div>
  </div>

  <div id="dezbateri_publice" class="cards grid">
    <div id="newsletter">
      <h4 data-i18n="newsletter.title"></h4>
      <p data-i18n="newsletter.description"></p>
      <ul id="newsletter-list"></ul>
      <p data-i18n="newsletter.gdpr"></p>

      <form>
        <input type="email" data-i18n="newsletter.placeholder_email" required />
        <button data-i18n="newsletter.button" type="submit"></button>
      </form>
    </div>

    <div id="cetateni_onoare">
      <h4 data-i18n="cetateni_onoare.title"></h4>
      <p data-i18n="cetateni_onoare.description"></p>
      <ul id="onoare-list"></ul>
      <p data-i18n="cetateni_onoare.note"></p>
    </div>

    <div id="sugestii_reclamatii">
      <h4 data-i18n="sugestii_reclamatii.title"></h4>
      <p data-i18n="sugestii_reclamatii.description"></p>

      <form>
        <input
          type="text"
          data-i18n="sugestii_reclamatii.placeholders.name"
          required
        />
        <input
          type="email"
          data-i18n="sugestii_reclamatii.placeholders.email"
          required
        />
        <textarea
          data-i18n="sugestii_reclamatii.placeholders.message"
          rows="5"
          required
        ></textarea>
        <button data-i18n="sugestii_reclamatii.button" type="submit"></button>
      </form>

      <p data-i18n="sugestii_reclamatii.note"></p>
    </div>

    <div id="bugetare_participativa">
      <h4 data-i18n="bugetare_participativa.title"></h4>
      <p data-i18n="bugetare_participativa.description"></p>
      <h5 data-i18n="bugetare_participativa.steps_title"></h5>
      <ul id="bugetare_participativa-list"></ul>
      <p data-i18n="bugetare_participativa.note"></p>
    </div>

    <div id="proceduri_online">
      <h4 data-i18n="proceduri_online.title"></h4>
      <p data-i18n="proceduri_online.description"></p>
      <ul id="proceduri_online-list"></ul>
      <p data-i18n="proceduri_online.note"></p>
    </div>

    <div id="live_webcam">
      <h4 data-i18n="live_webcam.title"></h4>
      <p data-i18n="live_webcam.description"></p>

      <div class="card">
        <h5 data-i18n="live_webcam.card_title"></h5>
        <p data-i18n="live_webcam.card_description"></p>
        <img src="http://IP-UL-TAU:PORT/video.cgi" alt="webcam" />
      </div>

      <p data-i18n="live_webcam.note"></p>
    </div>
  </div>
